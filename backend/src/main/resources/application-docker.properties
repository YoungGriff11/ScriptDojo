# ?? Database ??????????????????????????????????????????????????????????????????
# In Docker, MySQL runs as a container named "db" on the internal Docker network.
# The hostname "db" resolves automatically via Docker Compose service discovery.
# allowPublicKeyRetrieval=true is required for MySQL 8+ authentication over
# non-SSL connections; serverTimezone=UTC prevents timezone mismatch warnings.
spring.datasource.url=jdbc:mysql://db:3306/scriptdojo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=scriptdojo
spring.datasource.password=ScriptDojo2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA ???????????????????????????????????????????????????????????????????????
# ddl-auto=update allows Hibernate to apply schema changes on startup without
# dropping existing data. SQL logging is disabled to keep container logs clean ?
# verbose query output is only needed during local development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ?? Logging ???????????????????????????????????????????????????????????????????
# Hibernate SQL and parameter binding logs are suppressed to WARN level.
# Overrides the DEBUG/TRACE levels set in application.properties for local dev.
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ?? Docker Compose integration (disabled) ????????????????????????????????????
# Spring Boot's built-in Docker Compose support is disabled because containers
# are managed manually via compose.yaml rather than being lifecycle-managed
# by the Spring context.
spring.docker.compose.enabled=false

# ?? Share URL ?????????????????????????????????????????????????????????????????
# The public-facing base URL prepended to room IDs when generating shareable links.
# Used by RoomController to construct the URL returned to the host after room creation.
# Update to https://scriptdojo.ie once the production domain is live.
app.base-url=http://localhost:8080