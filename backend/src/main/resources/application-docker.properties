# ??? Database ????????????????????????????????????????????????????????????????
# In Docker, MySQL runs as a container named "db"
# Spring connects to it on the internal Docker network port 3306
spring.datasource.url=jdbc:mysql://db:3306/scriptdojo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=scriptdojo
spring.datasource.password=ScriptDojo2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA ?????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ??? Logging (quieter in production) ?????????????????????????????????????????
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ??? Docker Compose (disable Spring's built-in support) ??????????????????????
spring.docker.compose.enabled=false

# ??? Share URL ????????????????????????????????????????????????????????????????
# This is the public-facing URL guests will use to join rooms
# Change this to https://scriptdojo.ie once your domain is live
app.base-url=http://localhost:8080