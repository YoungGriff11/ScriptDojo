spring.application.name=backend
server.port=8080

# ?? Local Development Database ????????????????????????????????????????????????
# Connects to a local MySQL instance running on port 3307 (non-standard port
# used to avoid conflicts with any system-level MySQL installation on 3306).
# These values are overridden by application-docker.properties when running
# inside Docker, where the database is reached via container hostname on 3306.
spring.datasource.url=jdbc:mysql://localhost:3307/scriptdojo?useSSL=false
spring.datasource.username=root
spring.datasource.password=Scrapydoo41?
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ddl-auto=update allows Hibernate to apply schema changes automatically on
# startup without dropping existing data. Should be set to "validate" or "none"
# in a production environment to prevent unintended schema modifications.
spring.jpa.hibernate.ddl-auto=update

# ?? SQL Logging (development only) ???????????????????????????????????????????
# Logs all generated SQL statements and bound parameter values to the console.
# Overridden to WARN level in application-docker.properties to suppress verbose
# query output in the containerised environment.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ?? Docker Compose integration (disabled) ????????????????????????????????????
# Spring Boot's built-in Docker Compose support is disabled because containers
# are managed manually via compose.yaml rather than being lifecycle-managed
# by the Spring context.
spring.docker.compose.enabled=false