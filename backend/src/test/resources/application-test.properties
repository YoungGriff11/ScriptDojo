# ?? Test datasource ???????????????????????????????????????????????????????????
# Uses an H2 in-memory database scoped to the test JVM process.
# DB_CLOSE_DELAY=-1 keeps the database alive for the duration of the process
# rather than closing it when the last connection is released ? required for
# tests that open and close multiple connections against the same schema.
# MODE=MySQL instructs H2 to emulate MySQL behaviour (data types, functions,
# and syntax) so the same JPA mappings work against both the test and production databases.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
# ddl-auto=create-drop builds the schema from entity mappings when the context
# starts and tears it down when the context closes ? ensures a clean slate for
# every test run without requiring a migration script.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# SQL logging is disabled to keep test output readable ? enable temporarily
# when debugging unexpected query behaviour in failing tests.
spring.jpa.show-sql=false

# ?? Identifier quoting ????????????????????????????????????????????????????????
# Wraps all table and column names in quotes so that reserved words used as
# identifiers (e.g. "user", "role") are accepted by both H2 and MySQL without
# requiring manual @Column(name="...") overrides on every mapping.
# skip_column_definitions prevents quoting inside @Column(columnDefinition="...")
# values, which would produce invalid DDL for TEXT and similar type declarations.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true