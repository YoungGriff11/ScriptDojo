<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#0D1117"/>
  
  <!-- Green bracket left -->
  <text x="12" y="68" font-family="monospace" font-size="55" font-weight="bold" fill="#1F7A6E">&lt;</text>
  
  <!-- White slash -->
  <text x="36" y="68" font-family="monospace" font-size="55" font-weight="bold" fill="#FFFFFF">/</text>
  
  <!-- Green bracket right -->
  <text x="58" y="68" font-family="monospace" font-size="55" font-weight="bold" fill="#1F7A6E">&gt;</text>
</svg>